name: Golden AutoBlog + ETF Report

on:
  schedule:
    # 하루 2회 고품질 발행 (KST 09:00, 20:00)
    - cron: '0 0 * * *'    # KST 09:00 (오전)
    - cron: '0 11 * * *'   # KST 20:00 (야간)
  workflow_dispatch:
    inputs:
      count:
        description: '발행 편수'
        required: false
        default: '2'
      dry_run:
        description: '드라이런 (true/false)'
        required: false
        default: 'false'
      skip_etf:
        description: 'ETF 리포트 스킵 (true/false)'
        required: false
        default: 'false'
      niche:
        description: '니치/카테고리 필터 (빈값=전체)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  golden-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      WP_URL: ${{ secrets.WP_URL }}
      WP_USERNAME: ${{ secrets.WP_USERNAME }}
      WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
      GROK_API_KEY: ${{ secrets.GROK_API_KEY }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      CLAUDE_API_KEY: ${{ secrets.CLAUDE_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
      PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
      UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
      NAVER_REFRESH_TOKEN: ${{ secrets.NAVER_REFRESH_TOKEN }}
      NAVER_CAFE_CLUBID: ${{ secrets.NAVER_CAFE_CLUBID }}
      NAVER_CAFE_MENUID: ${{ secrets.NAVER_CAFE_MENUID }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
      SITE_ID: site-1

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Golden AutoBlog (고품질 모드)
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            COUNT="${{ github.event.inputs.count || '2' }}"
            DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
            NICHE="${{ github.event.inputs.niche || '' }}"
          else
            COUNT="2"
            DRY_RUN="false"
            NICHE=""
          fi

          ARGS="--all-sites --count $COUNT --pipeline autoblog --golden"
          if [ "$DRY_RUN" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          if [ -n "$NICHE" ]; then
            ARGS="$ARGS --niche $NICHE"
          fi

          python scripts/main.py $ARGS

      - name: Run ETF Report (평일 장 마감 후)
        if: >
          github.event_name == 'schedule' ||
          (github.event_name == 'workflow_dispatch' && github.event.inputs.skip_etf != 'true')
        run: |
          # 평일(월~금)만 ETF 리포트 발행
          DAY_OF_WEEK=$(date +%u)
          if [ "$DAY_OF_WEEK" -le 5 ]; then
            DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
            ARGS="--report-type blog-ready"
            if [ "$DRY_RUN" = "true" ]; then
              ARGS="$ARGS --dry-run"
            fi
            python scripts/etf_report.py $ARGS
          else
            echo "주말 — ETF 리포트 스킵"
          fi

      - name: Commit used keywords
        if: always()
        run: |
          git config user.email "bot@autoblog.com"
          git config user.name "AutoBlog Bot"
          git add data/used_keywords.json || true
          git diff --staged --quiet || git commit -m "chore: update used keywords $(date +%Y-%m-%d) [golden]"
          git push || true
